<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ASCII Animation Preview</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #282a36;
            color: #f8f8f2;
            overflow: hidden;
        }

        body {
            display: grid;
            place-items: center;
        }

        #ascii-player {
            /*
        Scale to fit: the animation is 240 chars wide.
        font-size: 1/240th of the viewport width → always fills horizontally.
        line-height: 1 keeps rows compact.
      */
            font: calc(100vw / 240) / 1 ui-monospace, "Space Mono", monospace;
            white-space: pre;
            overflow: hidden;
            background: transparent;
            border: 0;
            display: block;
            /*
        Scale down vertically too: if the animation is 68 rows tall,
        each row is (font-size * line-height) px, so total height =
        68 * (100vw/240). We use transform to squeeze it into 100vh.
      */
            transform-origin: top center;
        }
    </style>
</head>

<body>
    <pre id="ascii-player" aria-label="ASCII animation"></pre>

    <!--
    Paste your exported kaiwASCII <script> block here.
    It should look like: <script>(function(){ const d={f:[...]}; ... })();</script>
  -->

    <script>
        // After the animation script runs, dynamically scale the player to fit 100vh.
        // We do this on load and on resize.
        function fitPlayer() {
            const el = document.getElementById('ascii-player');
            if (!el || !el.textContent.trim()) return;
            // Reset transform to measure natural size
            el.style.transform = '';
            const naturalH = el.scrollHeight;
            const viewH = window.innerHeight;
            if (naturalH > viewH) {
                const scale = viewH / naturalH;
                el.style.transform = `scale(${scale})`;
                el.style.transformOrigin = 'top center';
            }
        }
        window.addEventListener('load', fitPlayer);
        window.addEventListener('resize', fitPlayer);
        // Also run after a short delay to catch the first rendered frame
        setTimeout(fitPlayer, 200);
        setTimeout(fitPlayer, 800);
    </script>
</body>

</html>
